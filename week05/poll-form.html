<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Exercise</title>
</head>
<header></header>
<main>
    <form>
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="useremail">Email Address:</label>
        <input type="text" name="useremail" id="useremail" required>

        <label for="browser">What is your favorite browser?:</label>
        <select name="browser" id="browser">
            <option value="1">Opera GX</option>
            <option value="2">Google Chrome</option>
            <option value="3">MS Edge</option>
        </select>

        <label><input type="checkbox" name="pet" id="pet">Do you have a household pet?</label>
    </form>
</main>
<footer></footer>

</html>
