<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting | Contact Us</title>
    <meta name="description"
      content="This page contains our contact information along with a form to send us questions.">
    <meta name="author" content="Nicolas Domingues Falcão">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="grid">
        <img src="images/wwr-logo.png" alt="White Water Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact">
            <h2>Splash Water Rafting Company</h2>
            <p>626 Paraná das Onças</p>
            <p>Comunidade Bom Sucesso, Amazonas</p>
            <p>+55 99779-9977</p>
            <p>info@splashwaterrifting.com</p>
        </div>

        <div class="layout">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d161141.89328935693!2d-59.422497146821094!3d-3.127788781616761!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1spt-BR!2sbr!4v1780484411042!5m2!1spt-BR!2sbr"
              width="600" height="450" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>

            <form>
                <div class="form-personal-info">
                    <label for="fullname"> Full Name</label>
                    <input type="text" name="fullname" id="fullname">
                    <label for="useremail">Email Address</label>
                    <input type="email" name="useremail" id="useremail">
                </div>
                <div class="form-group">
                    <p>Message Purpose</p>

                    <input type="radio" name="purpose" id="general" value="general">
                    <label for="general">General Inquiry</label>

                    <input type="radio" name="purpose" id="reservation" value="reservation">
                    <label for="reservation">Reservation Question</label>

                    <input type="radio" name="purpose" id="website" value="website">
                    <label for="website">Website Suggestion</label>
                </div>

                <div class="form-message">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" placeholder="Type here"></textarea>
                </div>
                <div class="form-submission">
                    <input type="checkbox" name="subscribe" id="subscribe">
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                </div>
                <div>
                    <button type="submit">Get in Touch!</button>
                </div>
            </form>
        </div>

        <section>
            <h2>We Are Here to Serve You</h2>
            <div class="employees">
                <figure>
                    <img src="images/" alt="Employee 1">
                </figure>
                <figure>
                    <img src="images/" alt="Employee 2">
                </figure>
                <figure>
                    <img src="" alt="Employee 3">
                </figure>
            </div>
        </section>
    </main>
    <footer class="flex">
        <p>&copy; 2026 | Splash Water Rafting | Nicolas D. Falcão</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook-icon.png"
                  alt="Small Facebook Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram-icon.png"
                  alt="Small Instagram Icon"></a>
            <a href="https://pinterest.com"><img src="images/pinterest-icon.png"
                  alt="Small Pinterest Icon"></a>
        </nav>
    </footer>
</body>

</html>
