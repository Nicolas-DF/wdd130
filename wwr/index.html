<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Water Rafting | Home Page</title>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="author" content="Nicolas Domingues Falcão">
</head>

<body>
    <header class="grid">
        <img src="images/wwr-logo.png" alt="Splash Water Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="hero">
            <div class="hero-index">
                <img src="images/hero-index.jpg" alt="Hero image of four men water rafting">
                <h1>Have an Adventure!</h1>
            </div>
        </div>


        <div class="newsletter">
            <p>Keep updated with our newsletter!</p>
            <form>
                <label for="username">Name:</label>
                <input type="text" name="username" id="username">
                <label for="useremail">Email:</label>
                <input type="email" name="useremail" id="useremail">
                <button type="submit">Subscribe</button>
            </form>
        </div>
    </main>
    <footer class="flex">
        <p>&copy; 2026 | Splash Water Rafting | Nicolas D. Falcão</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook-icon.png"
                  alt="Small Facebook Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram-icon.png"
                  alt="Small Instagram Icon"></a>
            <a href="https://pinterest.com"><img src="images/pinterest-icon.png"
                  alt="Small Pinterest Icon"></a>
        </nav>
    </footer>
</body>

</html>
